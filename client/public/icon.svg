<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="deckd">
  <!-- Rounded dark tile — leaves ~10% safe zone for maskable clipping. -->
  <rect width="512" height="512" rx="112" fill="#0e1115"/>
  <!-- Stylized 2x2 button deck in the deckd accent cyan. -->
  <g fill="#7dd3fc">
    <rect x="80"  y="140" width="150" height="150" rx="26"/>
    <rect x="282" y="140" width="150" height="150" rx="26"/>
    <rect x="80"  y="322" width="150" height="150" rx="26"/>
    <rect x="282" y="322" width="150" height="150" rx="26"/>
  </g>
</svg>
