# Firefox on macOS. Same match token as the Linux firefox.yaml (the Mac
# process is reported as `firefox`), so this file sorts first (the `-` is
# ASCII 0x2D, before `.`) and wins on the Mac. On a Linux checkout delete
# this file or restructure into per-platform layouts dirs.
match:
  - firefox
widgets:
  - id: new-tab
    kind: button
    label: New tab
    icon:
      source: lucide
      name: plus
    grid: [0, 0, 1, 1]
    action:
      key: "super+t"
  - id: new-window
    kind: button
    label: New window
    icon:
      source: lucide
      name: window
    grid: [1, 0, 1, 1]
    action:
      key: "super+n"
  - id: back
    kind: button
    label: Back
    icon:
      source: lucide
      name: arrow-left
    color: "#1e3a8a"
    grid: [2, 0, 1, 1]
    action:
      key: "super+["
  - id: forward
    kind: button
    label: Forward
    icon:
      source: lucide
      name: arrow-right
    color: "#1e3a8a"
    grid: [3, 0, 1, 1]
    action:
      key: "super+]"
  - id: reload
    kind: button
    label: Reload
    icon:
      source: lucide
      name: refresh
    grid: [0, 1, 1, 1]
    action:
      key: "super+r"
  - id: focus-url
    kind: button
    label: URL bar
    icon:
      source: lucide
      name: link
    grid: [1, 1, 1, 1]
    action:
      key: "super+l"
  - id: find
    kind: button
    label: Find
    icon:
      source: lucide
      name: search
    grid: [2, 1, 1, 1]
    action:
      key: "super+f"
  - id: close-tab
    kind: button
    label: Close tab
    icon:
      source: lucide
      name: close
    grid: [3, 1, 1, 1]
    action:
      key: "super+w"
