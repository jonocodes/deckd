match:
  - com.gexperts.Tilix
  - Tilix
widgets:
  - id: split-right
    kind: button
    label: Split right
    icon:
      source: lucide
      name: columns-2
    grid: [0, 0, 1, 1]
    action:
      key: "ctrl+alt+r"
  - id: split-down
    kind: button
    label: Split down
    icon:
      source: lucide
      name: rows-2
    grid: [1, 0, 1, 1]
    action:
      key: "ctrl+alt+d"
  - id: new-window
    kind: button
    label: New window
    icon:
      source: lucide
      name: app-window
    grid: [2, 0, 1, 1]
    action:
      key: "ctrl+shift+n"
  - id: next-terminal
    kind: button
    label: Next term
    icon:
      source: lucide
      name: arrow-right
    grid: [3, 0, 1, 1]
    action:
      key: "ctrl+tab"
  - id: close-terminal
    kind: button
    label: Close term
    icon:
      source: lucide
      name: x
    grid: [0, 1, 1, 1]
    action:
      key: "ctrl+shift+w"
